<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convite Lalá faz 20 anos</title>
    <!-- Importing exact fonts from the design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Playfair+Display:wght@700;900&family=Oswald:wght@400;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <div class="content">
        <!-- Título Principal -->
        <div class="main-title">
          <div class="lala-group">
            <span class="lala">Lalá</span>
            <span class="faz">faz</span>
          </div>
          <div class="vinte-anos">
            <span class="vinte">20</span>
            <span class="anos">ANOS</span>
          </div>
        </div>

        <!-- Cerveja amor & eu -->
        <div class="cerveja-amor">
          cerveja<br>amor<br>& eu
        </div>

        <div class="invite-msg">
          <p>ME RODEAR DE PESSOAS QUE AMO, ME FAZ LEMBRAR QUE ESTOU VIVA. POR ISSO CONVIDO VOCÊ PARA COMEMORAR COMIGO MEU ANIVERSÁRIO!</p>
        </div>

        <!-- Data, Hora e Local -->
        <div class="date-time-container">
          <div class="date-row">
            <div class="yellow-triangle t1"></div>
            <span class="date">20/05</span>
          </div>
          <div class="time-row">
            <span class="as">às</span>
            <span class="time">13:30</span>
            <div class="yellow-triangle t2"></div>
          </div>
          <a href="https://maps.google.com/?q=Av.+Mauro+Alves+Ribeiro+J%C3%BAnior,+810+-+Nossa+Sra.+Lourdes,+Natividade+-+RJ,+28380-000" target="_blank" class="location">
            <span class="pin">📍</span> 
            <div>CLUBE ESPORTIVO<br>BALNEÁRIO</div>
          </a>
        </div>

        <!-- Textos Finais -->
        <div class="bottom-texts">
          <p class="anxious">CONFIRME SUA PRESENÇA<br>PORQUE ELA É ANSIOSA</p>
          <p class="no-invite">CONVIDADO NÃO CONVIDA, HEIN!</p>
        </div>

        <!-- Botão WhatsApp -->
        <button id="whatsapp-btn">
          Confirmar Presença (WhatsApp)
        </button>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
